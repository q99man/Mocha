spring:
  datasource:
    url: jdbc:h2:mem:motion_challenge;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

app:
  scoring:
    sample-stub-enabled: true
  attempt:
    video-processing-mode: sync-inline