server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: motion-challenge-backend
  profiles:
    default: mysql
  config:
    import: optional:file:./.env[.properties],optional:file:./backend/.env[.properties]
  jpa:
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    redis:
      enabled: false

app:
  auth:
    frontend-base-url: ${APP_AUTH_FRONTEND_BASE_URL:http://localhost:5173}
    default-user-redirect-path: ${APP_AUTH_DEFAULT_USER_REDIRECT_PATH:/mypage}
    default-admin-redirect-path: ${APP_AUTH_DEFAULT_ADMIN_REDIRECT_PATH:/admin}
    failure-redirect-path: ${APP_AUTH_FAILURE_REDIRECT_PATH:/auth?error=social}
    oauth2:
      enabled: ${APP_AUTH_OAUTH2_ENABLED:false}
      google:
        client-id: ${APP_AUTH_OAUTH2_GOOGLE_CLIENT_ID:}
        client-secret: ${APP_AUTH_OAUTH2_GOOGLE_CLIENT_SECRET:}
      kakao:
        client-id: ${APP_AUTH_OAUTH2_KAKAO_CLIENT_ID:}
        client-secret: ${APP_AUTH_OAUTH2_KAKAO_CLIENT_SECRET:}
      naver:
        client-id: ${APP_AUTH_OAUTH2_NAVER_CLIENT_ID:}
        client-secret: ${APP_AUTH_OAUTH2_NAVER_CLIENT_SECRET:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  motion:
    analysis:
      provider: ${APP_MOTION_ANALYSIS_PROVIDER:mediapipe}
      schema-version: ${APP_MOTION_ANALYSIS_SCHEMA_VERSION:v1}
      mediapipe:
        endpoint: ${APP_MOTION_MEDIAPIPE_ENDPOINT:http://localhost:8000}
        analyze-path: ${APP_MOTION_MEDIAPIPE_ANALYZE_PATH:/api/v1/analyze}
        timeout-millis: ${APP_MOTION_MEDIAPIPE_TIMEOUT_MILLIS:20000}
  cache:
    popular-challenges-ttl-seconds: ${POPULAR_CHALLENGES_CACHE_TTL:300}
  storage:
    local-root: ${APP_STORAGE_LOCAL_ROOT:uploads}
  attempt:
    video-processing-mode: ${APP_ATTEMPT_VIDEO_PROCESSING_MODE:sync-inline}
    async-pending-auto-complete-enabled: ${APP_ATTEMPT_ASYNC_PENDING_AUTO_COMPLETE_ENABLED:false}
    async-pending-auto-complete-delay-millis: ${APP_ATTEMPT_ASYNC_PENDING_AUTO_COMPLETE_DELAY_MILLIS:2500}
    async-pending-auto-complete-retry-delay-millis: ${APP_ATTEMPT_ASYNC_PENDING_AUTO_COMPLETE_RETRY_DELAY_MILLIS:4000}
    async-pending-auto-complete-max-attempts: ${APP_ATTEMPT_ASYNC_PENDING_AUTO_COMPLETE_MAX_ATTEMPTS:3}
